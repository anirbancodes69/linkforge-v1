server {

    # SSL configuration (uncomment for production) ************

    # listen 80 ssl;
    # server_name devbyanirban.com;

    # ssl_certificate /etc/letsencrypt/live/devbyanirban.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/devbyanirban.com/privkey.pem;

    listen 80;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}