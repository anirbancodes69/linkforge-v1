services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_container
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx_container
    ports:
      - "8000:80" # Change to "80:80" for production
      # - "443:443"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # - /etc/letsencrypt:/etc/letsencrypt # For SSL certificates
    depends_on:
      - app
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: queue_container
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./backend:/var/www
    depends_on:
      - app
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres_container
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata: